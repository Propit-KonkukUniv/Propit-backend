name: Deploy

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/propit-server:latest .

      - name: Login Docker Hub
        if: github.event_name == 'push'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/propit-server:latest

      - name: Deploy to EC2
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ubuntu
          key: ${{ secrets.REMOTE_SSH_KEY }}
          port: 22
          script: |
            docker stop propit-server || true
            docker rm propit-server || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/propit-server:latest

            docker run -d -p 8080:8080 --name propit-server -e SPRING_PROFILES_ACTIVE=prod -e DB_URL=${{ secrets.DB_URL }} -e DB_USER=${{ secrets.DB_USER }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ secrets.DOCKER_USERNAME }}/propit-server:latest
